<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stacks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#13111c;--bg-2:#1b1830;--panel:#211d38;--panel-2:#2a2548;
    --text:#f4f1ff;--text-soft:#9b95c4;--text-dim:#6f6996;
    --line:#352f5a;--line-soft:#2c2750;
    --accent:#ff5c8a;--accent-2:#ffb84d;--urgent:#ff5c5c;--urgent-bg:#3a1f2e;--done:#5fe0a8;
    --sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --pop:'Trebuchet MS','Segoe UI',var(--sans);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{
    font-family:var(--sans);color:var(--text);
    background:
      radial-gradient(900px 500px at 12% -5%, #2a1f4d 0%, transparent 55%),
      radial-gradient(800px 600px at 95% 10%, #3a1d3f 0%, transparent 50%),
      radial-gradient(700px 700px at 50% 120%, #1d2a44 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;
  }

  #bar{
    position:fixed;top:0;left:0;right:0;height:62px;z-index:60;
    display:flex;align-items:center;gap:14px;padding:0 20px;
    background:rgba(19,17,28,.72);backdrop-filter:blur(16px) saturate(140%);
    border-bottom:1px solid var(--line-soft);
  }
  #brand{font-family:var(--pop);font-weight:800;letter-spacing:-.03em;font-size:23px;display:flex;align-items:center;gap:11px;}
  #brand .logo{width:26px;height:26px;border-radius:8px;position:relative;flex:0 0 auto;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 4px 14px rgba(255,92,138,.45);transform:rotate(-6deg);}
  #brand .logo::after{content:"";position:absolute;inset:5px 5px auto 5px;height:3px;border-radius:3px;background:rgba(255,255,255,.85);box-shadow:0 6px 0 rgba(255,255,255,.55),0 12px 0 rgba(255,255,255,.3);}
  #brand small{font-weight:600;color:var(--text-dim);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;margin-left:2px;}
  .grow{flex:1;}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--text);font:inherit;font-size:13px;font-weight:700;padding:9px 14px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .08s,background .15s,border-color .15s;}
  .btn:hover{background:var(--panel-2);}
  .btn:active{transform:translateY(1px) scale(.98);}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#ff7aa3);border:none;color:#fff;box-shadow:0 4px 16px rgba(255,92,138,.4);}
  .btn.primary:hover{filter:brightness(1.08);}
  #sync{font-size:11px;color:var(--text-dim);min-width:62px;text-align:right;letter-spacing:.03em;font-weight:600;display:flex;align-items:center;gap:6px;justify-content:flex-end;}
  #sync .led{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:.2s;}
  #sync.on .led{background:var(--done);box-shadow:0 0 8px var(--done);}
  #sync.busy .led{background:var(--accent-2);box-shadow:0 0 8px var(--accent-2);}
  #sync.err .led{background:var(--urgent);box-shadow:0 0 8px var(--urgent);}
  #refresh{width:36px;padding:0;justify-content:center;}

  #board{position:absolute;inset:62px 0 0 0;overflow-y:auto;overflow-x:hidden;padding:26px;}
  #board::-webkit-scrollbar{width:10px;}
  #board::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}

  #grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));gap:20px;align-items:start;max-width:1500px;margin:0 auto;}
  .slot{min-width:0;}
  .slot.dragging{opacity:.35;}
  .slot.drop-target .win{box-shadow:0 0 0 2px var(--accent), 0 18px 40px rgba(0,0,0,.5);}

  .win{background:linear-gradient(180deg, var(--panel) 0%, #1d1933 100%);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 14px 34px rgba(0,0,0,.42), 0 1px 0 rgba(255,255,255,.05) inset;display:flex;flex-direction:column;--c:var(--accent);transition:box-shadow .15s,transform .12s;}
  .win:hover{transform:translateY(-2px);}
  .win.collapsed .win-body,.win.collapsed .win-add{display:none;}

  .win-head{display:flex;align-items:center;gap:9px;padding:13px 10px 13px 15px;cursor:grab;user-select:none;background:linear-gradient(180deg, color-mix(in srgb, var(--c) 26%, var(--panel)) 0%, transparent 140%);border-bottom:1px solid var(--line-soft);position:relative;}
  .win-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c);}
  .win-head:active{cursor:grabbing;}
  .grip{display:flex;flex-direction:column;gap:2px;flex:0 0 auto;padding:2px;opacity:.45;}
  .grip span{width:11px;height:2px;border-radius:2px;background:var(--text-soft);}
  .swatch{width:15px;height:15px;border-radius:5px;flex:0 0 auto;background:var(--c);cursor:pointer;box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 30%,transparent);}
  .win-title{flex:1;font-family:var(--pop);font-weight:800;font-size:15.5px;letter-spacing:-.01em;background:none;border:none;color:var(--text);padding:3px 4px;min-width:0;border-radius:6px;}
  .win-title:focus{outline:none;background:rgba(255,255,255,.07);}
  .win-count{font-size:11px;color:var(--c);font-weight:800;background:color-mix(in srgb,var(--c) 16%,transparent);padding:3px 9px;border-radius:20px;flex:0 0 auto;}
  .ic{width:28px;height:28px;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--text-dim);font-size:15px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.12s;}
  .ic:hover{background:rgba(255,255,255,.08);color:var(--text);}

  .win-body{padding:6px 0 2px;}
  .sect{padding:5px 14px 3px;}
  .sect-label{font-size:9.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px;margin:4px 0 5px;}
  .sect.urgent .sect-label{color:var(--urgent);}
  .sect-label .bar{height:1px;flex:1;background:var(--line-soft);}

  .item{display:flex;align-items:flex-start;gap:10px;padding:8px;border-radius:11px;cursor:pointer;transition:background .12s;touch-action:pan-y;}
  .item-lifted{opacity:.35;}
  .drag-ghost{position:fixed;z-index:200;pointer-events:none;background:var(--panel-2);border:1px solid var(--c,var(--accent));border-radius:11px;box-shadow:0 18px 40px rgba(0,0,0,.6);padding:8px;opacity:.96;will-change:transform;}
  .win.win-drop{box-shadow:0 0 0 2px var(--done), 0 18px 44px rgba(0,0,0,.55) !important;}
  .win.win-drop .win-body{background:rgba(95,224,168,.07);}
  .item:hover{background:rgba(255,255,255,.05);}
  .item.urgent{background:var(--urgent-bg);}
  .item.urgent:hover{background:#48273a;}
  .box{width:20px;height:20px;border:2px solid var(--text-dim);border-radius:7px;flex:0 0 auto;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .14s;}
  .item.urgent .box{border-color:var(--urgent);}
  .box svg{width:12px;height:12px;opacity:0;transform:scale(.4) rotate(-15deg);transition:all .18s cubic-bezier(.2,1.6,.4,1);}
  .item.done .box{background:linear-gradient(135deg,#5fe0a8,#39c98a);border-color:var(--done);box-shadow:0 0 12px rgba(95,224,168,.4);}
  .item.done .box svg{opacity:1;transform:scale(1) rotate(0);stroke:#0c2a1e;}
  .item-text{flex:1;font-size:14px;line-height:1.4;background:none;border:none;color:var(--text);font-family:inherit;padding:1px 0;resize:none;min-width:0;word-break:break-word;overflow:hidden;}
  .item-text:focus{outline:none;}
  .item-text::placeholder{color:var(--text-dim);}
  .item.done .item-text{text-decoration:line-through;color:var(--text-dim);}
  .flag{width:24px;height:24px;border:none;background:none;cursor:pointer;font-size:13px;flex:0 0 auto;margin-top:1px;color:var(--line);transition:.12s;}
  .item:hover .flag{color:var(--text-dim);}
  .item.urgent .flag,.item.urgent:hover .flag{color:var(--urgent);}
  .item-x{opacity:0;width:24px;height:24px;font-size:13px;}
  .item:hover .item-x{opacity:.7;}
  .item-x:hover{opacity:1;}

  .win-add{display:flex;align-items:center;border-top:1px solid var(--line-soft);background:rgba(0,0,0,.18);}
  .win-add .plus{border:none;background:none;padding:0 6px 0 15px;color:var(--c);font-size:20px;font-weight:700;cursor:pointer;line-height:1;align-self:stretch;display:flex;align-items:center;transition:transform .1s,opacity .12s;}
  .win-add .plus:hover{transform:scale(1.18);}
  .win-add .plus:active{transform:scale(.9);}
  .win-add input{flex:1;border:none;background:none;font:inherit;font-size:13.5px;padding:13px 14px 13px 6px;color:var(--text);}
  .win-add input:focus{outline:none;}
  .win-add input::placeholder{color:var(--text-dim);}

  .addcard{border:2px dashed var(--line);border-radius:18px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);cursor:pointer;font-weight:700;font-size:14px;transition:.15s;background:rgba(255,255,255,.015);}
  .addcard:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,92,138,.05);transform:translateY(-2px);}
  .addcard .big{font-size:30px;line-height:1;}

  .cmenu{position:fixed;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.5);padding:10px;z-index:90;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cmenu .c{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.1s;}
  .cmenu .c:hover{transform:scale(1.15);border-color:rgba(255,255,255,.4);}

  /* archive button on item */
  .arch{opacity:0;width:24px;height:24px;font-size:13px;}
  .item:hover .arch{opacity:.7;}
  .arch:hover{opacity:1;}

  /* "archive checked" mini-button in stack footer area */
  .win-tools{display:flex;justify-content:flex-end;padding:2px 10px 6px;}
  .archbtn{border:none;background:none;color:var(--text-dim);font:inherit;font-size:11px;font-weight:700;cursor:pointer;padding:5px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;transition:.12s;}
  .archbtn:hover{background:rgba(255,255,255,.06);color:var(--done);}
  .archbtn[disabled]{opacity:.35;cursor:default;}
  .archbtn[disabled]:hover{background:none;color:var(--text-dim);}

  /* bottom archive bar */
  #archbar{
    position:fixed;left:0;right:0;bottom:0;z-index:55;display:flex;justify-content:center;pointer-events:none;
  }
  #archbar button{
    pointer-events:auto;margin-bottom:18px;border:1px solid var(--line);
    background:rgba(33,29,56,.92);backdrop-filter:blur(14px);color:var(--text-soft);
    font:inherit;font-size:13px;font-weight:700;padding:11px 18px;border-radius:14px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 30px rgba(0,0,0,.45);transition:.15s;
  }
  #archbar button:hover{color:var(--text);border-color:var(--accent);transform:translateY(-2px);}
  #archbar .pill{font-size:11px;font-weight:800;background:var(--accent);color:#fff;border-radius:20px;padding:2px 8px;}

  /* archive drawer */
  #drawer-scrim{position:fixed;inset:0;background:rgba(10,8,18,.55);backdrop-filter:blur(4px);z-index:110;display:none;}
  #drawer-scrim.show{display:block;}
  #drawer{
    position:fixed;left:0;right:0;bottom:0;z-index:111;max-height:72vh;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border-top:1px solid var(--line);border-radius:22px 22px 0 0;
    box-shadow:0 -16px 50px rgba(0,0,0,.55);transform:translateY(100%);transition:transform .26s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column;
  }
  #drawer.show{transform:translateY(0);}
  .draw-head{display:flex;align-items:center;gap:12px;padding:16px 20px 12px;border-bottom:1px solid var(--line-soft);}
  .draw-head .grab{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:42px;height:4px;border-radius:4px;background:var(--line);}
  .draw-head h3{font-family:var(--pop);margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:9px;}
  .draw-head .count{font-size:11px;font-weight:800;color:var(--accent-2);background:color-mix(in srgb,var(--accent-2) 16%,transparent);padding:3px 9px;border-radius:20px;}
  .draw-clear{border:none;background:none;color:var(--text-dim);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:6px 10px;border-radius:8px;}
  .draw-clear:hover{color:var(--urgent);background:rgba(255,92,92,.08);}
  .draw-body{overflow-y:auto;padding:8px 14px 26px;}
  .draw-body::-webkit-scrollbar{width:9px;}
  .draw-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;}
  .arch-section-label{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin:14px 6px 8px;}
  .arch-stack-row{display:flex;align-items:center;gap:11px;padding:12px;border-radius:12px;background:rgba(255,255,255,.04);margin:0 4px 7px;border:1px solid var(--line-soft);}
  .arch-stack-row .sdot{width:14px;height:14px;border-radius:5px;flex:0 0 auto;}
  .arch-stack-row .stxt{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
  .arch-stack-row .sname{font-size:14.5px;font-weight:700;color:var(--text);word-break:break-word;}
  .arch-stack-row .smeta{font-size:11px;color:var(--text-dim);font-weight:600;}
  .arch-stack-row .restore{border:1px solid var(--line);background:var(--panel);color:var(--text);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:7px 12px;border-radius:9px;flex:0 0 auto;transition:.12s;}
  .arch-stack-row .restore:hover{border-color:var(--done);color:var(--done);}
  .arch-stack-row .del{border:none;background:none;color:var(--text-dim);cursor:pointer;font-size:13px;width:26px;height:26px;border-radius:8px;flex:0 0 auto;}
  .arch-stack-row .del:hover{color:var(--urgent);background:rgba(255,92,92,.08);}
  .arch-group{margin:10px 4px 4px;}
  .arch-group-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px;margin-bottom:5px;padding-left:4px;}
  .arch-group-label .dot{width:9px;height:9px;border-radius:3px;}
  .arch-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.03);margin-bottom:6px;}
  .arch-row .txt{flex:1;font-size:14px;color:var(--text-soft);min-width:0;word-break:break-word;}
  .arch-row .restore{border:1px solid var(--line);background:var(--panel);color:var(--text);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:6px 11px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;transition:.12s;}
  .arch-row .restore:hover{border-color:var(--done);color:var(--done);}
  .arch-row .del{border:none;background:none;color:var(--text-dim);cursor:pointer;font-size:13px;width:26px;height:26px;border-radius:8px;flex:0 0 auto;}
  .arch-row .del:hover{color:var(--urgent);background:rgba(255,92,92,.08);}
  .draw-empty{text-align:center;color:var(--text-dim);padding:40px 20px;font-size:14px;}

  #empty{position:absolute;inset:62px 0 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-soft);text-align:center;pointer-events:none;gap:12px;padding:30px;}
  #empty .blob{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent-2));transform:rotate(-8deg);box-shadow:0 14px 36px rgba(255,92,138,.4);opacity:.92;}
  #empty h2{font-family:var(--pop);font-size:25px;color:var(--text);margin:0;font-weight:800;letter-spacing:-.02em;}
  #empty p{margin:0;font-size:14.5px;max-width:330px;line-height:1.55;color:var(--text-soft);}

  #authScrim{position:fixed;inset:0;background:rgba(10,8,18,.66);backdrop-filter:blur(6px);z-index:120;display:none;align-items:center;justify-content:center;padding:20px;}
  #authScrim.show{display:flex;}
  .auth-modal{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:22px;width:360px;max-width:100%;padding:30px;box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .auth-logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));transform:rotate(-6deg);box-shadow:0 8px 22px rgba(255,92,138,.45);margin-bottom:16px;position:relative;}
  .auth-logo::after{content:"";position:absolute;inset:9px 9px auto 9px;height:4px;border-radius:4px;background:rgba(255,255,255,.9);box-shadow:0 9px 0 rgba(255,255,255,.6),0 18px 0 rgba(255,255,255,.35);}
  .auth-modal h3{font-family:var(--pop);margin:0 0 5px;font-size:23px;font-weight:800;letter-spacing:-.02em;}
  .auth-modal p{margin:0 0 8px;font-size:13px;color:var(--text-soft);line-height:1.5;}
  .auth-modal label{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);display:block;margin:15px 0 6px;}
  .auth-modal input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font:inherit;font-size:14px;background:rgba(0,0,0,.25);color:var(--text);}
  .auth-modal input:focus{outline:none;border-color:var(--accent);}
  .auth-modal .row{display:flex;gap:10px;margin-top:22px;}
  .auth-modal .row .btn{flex:1;justify-content:center;padding:12px;}
  .auth-modal .msg{font-size:12.5px;margin-top:14px;min-height:16px;}
  .auth-modal .msg.err{color:var(--urgent);}
  .auth-modal .msg.ok{color:var(--done);}
  .auth-modal .alt{text-align:center;margin-top:16px;font-size:13px;color:var(--text-soft);}
  .auth-modal .alt a{color:var(--accent);font-weight:800;cursor:pointer;}

  @media (max-width:600px){
    #brand small{display:none;}
    .btn .lbl{display:none;}
    .btn{padding:10px 12px;}
    #board{padding:16px;}
    #grid{grid-template-columns:1fr;gap:16px;}
  }
</style>
</head>
<body>

<div id="bar">
  <div id="brand"><span class="logo"></span>Stacks <small>checklists</small></div>
  <div class="grow"></div>
  <span id="sync"><span class="led"></span><span id="syncTxt">offline</span></span>
  <button class="btn" id="refresh" title="Pull latest from cloud">⟳</button>
  <button class="btn primary" id="addBtn"><span>＋</span><span class="lbl">New stack</span></button>
  <button class="btn" id="acctBtn"><span>👤</span><span class="lbl">Sign in</span></button>
</div>

<div id="board"><div id="grid"></div></div>

<div id="empty">
  <div class="blob"></div>
  <h2>Start a stack</h2>
  <p>Groceries, a project, work to-dos, whatever. Flag the things that can't wait and they jump to the top. Drag stacks around to reorder them.</p>
</div>

<div id="archbar"><button id="openArch">🗄️ Archive <span class="pill" id="archPill">0</span></button></div>

<div id="drawer-scrim"></div>
<div id="drawer">
  <div class="draw-head">
    <span class="grab"></span>
    <h3>🗄️ Archive <span class="count" id="drawCount">0</span></h3>
    <div class="grow"></div>
    <button class="draw-clear" id="drawClear">Clear all</button>
    <button class="ic" id="drawClose" title="Close">✕</button>
  </div>
  <div class="draw-body" id="drawBody"></div>
</div>

<div id="authScrim">
  <div class="auth-modal">
    <div class="auth-logo"></div>
    <h3 id="aTitle">Welcome back</h3>
    <p id="aSub">Sign in to load your stacks on any device.</p>
    <label>Email</label>
    <input id="aEmail" type="email" autocomplete="email" placeholder="you@email.com">
    <label>Password</label>
    <input id="aPass" type="password" autocomplete="current-password" placeholder="••••••••">
    <div class="row">
      <button class="btn" id="aCancel">Cancel</button>
      <button class="btn primary" id="aGo">Sign in</button>
    </div>
    <div class="msg" id="aMsg"></div>
    <div class="alt" id="aAlt">New here? <a id="aSwap">Create an account</a></div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
const SUPA_URL = "https://ywjtbzxfdudrqsvsslzs.supabase.co";
const SUPA_KEY = "sb_publishable_Vt5ul1fZGuwxG8zq_ejyNw_kJackpiu";
const TABLE    = "stacks";
const LS_KEY   = "stacks_state_v4";

/* ============ STATE ============ */
let sb=null, user=null, dirty=false, saveTimer=null, loaded=false;
let state={ stacks:[], archive:[], archivedStacks:[] };  // archive: loose items; archivedStacks: whole stacks

const PALETTE=["#ff5c8a","#ffb84d","#5fe0a8","#4fc3f7","#a78bfa","#ff8a5c","#f06292","#7ed957"];
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,10);

/* ============ PERSIST ============ */
function loadLocal(){ try{const r=localStorage.getItem(LS_KEY); if(r)state=JSON.parse(r);}catch(e){} normalize(); }
function normalize(){ if(!state||typeof state!=="object")state={stacks:[],archive:[],archivedStacks:[]}; if(!Array.isArray(state.stacks))state.stacks=[]; if(!Array.isArray(state.archive))state.archive=[]; if(!Array.isArray(state.archivedStacks))state.archivedStacks=[]; }
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function markDirty(){ dirty=true; saveLocal(); if(saveTimer)clearTimeout(saveTimer); saveTimer=setTimeout(pushCloud,700); }

async function pushCloud(){
  if(!sb||!user){ setSync(user?"local only":"signed out","off"); return; }
  setSync("saving…","busy");
  const {error}=await sb.from(TABLE).upsert(
    {user_id:user.id, data:state, updated_at:new Date().toISOString()},
    {onConflict:"user_id"}
  );
  if(error){ setSync("save failed","err"); console.error(error); return; }
  dirty=false; setSync("synced","on");
}
async function pullCloud(){
  if(!sb||!user)return;
  setSync("loading…","busy");
  const {data,error}=await sb.from(TABLE).select("data").eq("user_id",user.id).maybeSingle();
  if(error){ setSync("load failed","err"); console.error(error); return; }
  if(data&&data.data){ state=data.data; normalize(); saveLocal(); render(); renderDrawer(); }
  else { await pushCloud(); } // first run for this account: create the row
  loaded=true; setSync("synced","on");
}
function setSync(txt,cls){ $("#syncTxt").textContent=txt; const e=$("#sync"); e.className=""; if(cls&&cls!=="off")e.classList.add(cls); }

/* ============ SUPABASE / AUTH ============ */
function initSupa(){
  if(SUPA_KEY.startsWith("REPLACE")){ setSync("local only","off"); return; }
  try{
    sb=supabase.createClient(SUPA_URL,SUPA_KEY);
    sb.auth.getSession().then(({data})=>{ if(data.session){ user=data.session.user; afterLogin(); } else { setSync("signed out","off"); } });
    sb.auth.onAuthStateChange((_e,s)=>{ user=s?s.user:null; });
  }catch(e){ console.error(e); setSync("local only","off"); }
}
async function afterLogin(){
  $("#acctBtn").innerHTML='<span>✓</span><span class="lbl">'+escapeHtml(user.email.split("@")[0])+'</span>';
  await pullCloud();
}
function openAuth(){
  if(user){
    if(confirm("Sign out of "+user.email+"?")){ sb.auth.signOut(); user=null; state={stacks:[],archive:[],archivedStacks:[]}; saveLocal(); render(); renderDrawer(); $("#acctBtn").innerHTML='<span>👤</span><span class="lbl">Sign in</span>'; setSync("signed out","off"); }
    return;
  }
  if(!sb){ alert("Cloud sync isn't configured."); return; }
  $("#authScrim").classList.add("show"); $("#aMsg").textContent=""; $("#aEmail").focus();
}
let authMode="signin";
function setAuthMode(m){
  authMode=m;
  $("#aTitle").textContent=m==="signin"?"Welcome back":"Create your account";
  $("#aGo").textContent=m==="signin"?"Sign in":"Create account";
  $("#aSub").textContent=m==="signin"?"Sign in to load your stacks on any device.":"Pick an email and password. That's it, you're in.";
  $("#aAlt").innerHTML=m==="signin"?'New here? <a id="aSwap">Create an account</a>':'Already have one? <a id="aSwap">Sign in</a>';
  $("#aSwap").addEventListener("click",()=>setAuthMode(m==="signin"?"signup":"signin"));
}
async function doAuth(){
  const email=$("#aEmail").value.trim(), pass=$("#aPass").value, msg=$("#aMsg"); msg.className="msg";
  if(!email||!pass){ msg.textContent="Enter an email and password."; msg.classList.add("err"); return; }
  if(pass.length<6){ msg.textContent="Password needs at least 6 characters."; msg.classList.add("err"); return; }
  $("#aGo").disabled=true; msg.textContent="Working…";
  let res; if(authMode==="signin") res=await sb.auth.signInWithPassword({email,password:pass}); else res=await sb.auth.signUp({email,password:pass});
  $("#aGo").disabled=false;
  if(res.error){ msg.textContent=res.error.message; msg.classList.add("err"); return; }
  if(authMode==="signup" && !res.data.session){ msg.textContent="Account made — now sign in."; msg.classList.add("ok"); setAuthMode("signin"); return; }
  user=res.data.user;
  // merge: if this device has local stacks and the account is empty, keep them
  $("#authScrim").classList.remove("show");
  await afterLogin();
}

/* ============ RENDER ============ */
const grid=$("#grid");
function render(){
  grid.innerHTML="";
  $("#empty").style.display=state.stacks.length?"none":"flex";
  state.stacks.forEach(s=>grid.appendChild(buildSlot(s)));
  const ac=document.createElement("div");
  ac.className="addcard";
  ac.innerHTML='<div class="big">＋</div><div>New stack</div>';
  ac.addEventListener("click",newStack);
  grid.appendChild(ac);
}

function buildSlot(s){
  const slot=document.createElement("div");
  slot.className="slot"; slot.dataset.id=s.id; slot.draggable=false;
  const win=document.createElement("div");
  win.className="win"+(s.collapsed?" collapsed":"");
  win.style.setProperty("--c",s.color);
  const total=s.items.length, done=s.items.filter(i=>i.done).length;

  const head=document.createElement("div");
  head.className="win-head";
  head.innerHTML='<span class="grip"><span></span><span></span><span></span></span>'
    +'<span class="swatch"></span>'
    +'<input class="win-title" spellcheck="false">'
    +'<span class="win-count">'+done+'/'+total+'</span>'
    +'<button class="ic j-col" title="Collapse">'+(s.collapsed?"▸":"▾")+'</button>'
    +'<button class="ic j-archstack" title="Archive whole stack">🗄️</button>'
    +'<button class="ic j-del" title="Delete stack">✕</button>';
  head.querySelector(".win-title").value=s.title;
  win.appendChild(head);

  const body=document.createElement("div");
  body.className="win-body";
  const urgent=s.items.filter(i=>i.urgent), normal=s.items.filter(i=>!i.urgent);
  if(urgent.length) body.appendChild(section('⚡ Urgent',urgent,s,true));
  if(normal.length||!urgent.length) body.appendChild(section(urgent.length?"Later":"Items",normal,s,false));
  win.appendChild(body);

  const checkedCount=s.items.filter(i=>i.done).length;
  if(checkedCount){
    const tools=document.createElement("div");
    tools.className="win-tools";
    tools.innerHTML='<button class="archbtn j-archall">🗄️ Archive '+checkedCount+' checked</button>';
    tools.querySelector(".j-archall").addEventListener("click",e=>{e.stopPropagation();archiveChecked(s);});
    win.appendChild(tools);
  }

  const add=document.createElement("div");
  add.className="win-add";
  add.innerHTML='<button class="plus" title="Add item">＋</button><input placeholder="Add an item…" spellcheck="false">';
  win.appendChild(add);

  slot.appendChild(win);
  wire(slot,win,s,head,body,add);
  return slot;
}

function section(label,items,s,isUrgent){
  const sec=document.createElement("div");
  sec.className="sect"+(isUrgent?" urgent":"");
  sec.innerHTML='<div class="sect-label">'+label+'<span class="bar"></span></div>';
  items.forEach(it=>sec.appendChild(itemEl(it,s)));
  return sec;
}

function itemEl(it,s){
  const el=document.createElement("div");
  el.className="item"+(it.done?" done":"")+(it.urgent?" urgent":"");
  el.dataset.itemId=it.id;
  el.innerHTML='<span class="box"><svg viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>'
    +'<textarea class="item-text" rows="1" placeholder="Item"></textarea>'
    +'<button class="flag" title="Flag urgent">⚑</button>'
    +'<button class="ic arch" title="Archive">🗄️</button>'
    +'<button class="ic item-x" title="Delete">✕</button>';
  const ta=el.querySelector(".item-text");
  ta.value=it.text||"";
  requestAnimationFrame(()=>grow(ta));
  el.querySelector(".box").addEventListener("click",e=>{e.stopPropagation();toggle(it,el,s);});
  el.addEventListener("click",e=>{ if(e.target.closest(".item-text,.flag,.item-x,.arch,.box"))return; if(suppressClick){suppressClick=false;return;} toggle(it,el,s); });
  el.querySelector(".flag").addEventListener("click",e=>{e.stopPropagation();it.urgent=!it.urgent;markDirty();render();});
  el.querySelector(".arch").addEventListener("click",e=>{e.stopPropagation();archiveItem(it,s);});
  el.querySelector(".item-x").addEventListener("click",e=>{e.stopPropagation();s.items=s.items.filter(x=>x.id!==it.id);markDirty();render();});
  ta.addEventListener("input",()=>{it.text=ta.value;grow(ta);markDirty();});
  ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();ta.blur();}});

  // press-and-hold to drag item to another list (works on mouse + touch)
  el.addEventListener("pointerdown",e=>{ if(e.target.closest(".item-text,.flag,.item-x,.arch,.box"))return; beginItemDrag(e,it,s,el); });
  return el;
}
let suppressClick=false;
function toggle(it,el,s){ it.done=!it.done; el.classList.toggle("done"); count(s); markDirty(); }
function grow(ta){ ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; }
function count(s){ const slot=grid.querySelector('.slot[data-id="'+s.id+'"]'); if(slot){const t=s.items.length,d=s.items.filter(i=>i.done).length; slot.querySelector(".win-count").textContent=d+"/"+t;} }

/* ============ WIRING ============ */
function wire(slot,win,s,head,body,add){
  const title=head.querySelector(".win-title");
  title.addEventListener("input",()=>{s.title=title.value;markDirty();});
  title.addEventListener("mousedown",e=>e.stopPropagation());
  head.querySelector(".swatch").addEventListener("click",e=>{e.stopPropagation();colorMenu(e.currentTarget,s);});
  head.querySelector(".j-col").addEventListener("click",e=>{e.stopPropagation();s.collapsed=!s.collapsed;markDirty();render();});
  head.querySelector(".j-archstack").addEventListener("click",e=>{e.stopPropagation();archiveStack(s);});
  head.querySelector(".j-del").addEventListener("click",e=>{e.stopPropagation();if(confirm('Delete "'+(s.title||"this stack")+'"? This can\'t be undone.')){state.stacks=state.stacks.filter(x=>x.id!==s.id);markDirty();render();}});

  const inp=add.querySelector("input");
  const commit=()=>{const v=inp.value.trim();if(v){s.items.push({id:uid(),text:v,done:false,urgent:false});inp.value="";markDirty();render();const w=grid.querySelector('.slot[data-id="'+s.id+'"] .win-add input');if(w)w.focus();}else{inp.focus();}};
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")commit();});
  add.querySelector(".plus").addEventListener("click",e=>{e.stopPropagation();commit();});
  add.querySelector(".plus").addEventListener("mousedown",e=>e.stopPropagation());
  add.addEventListener("mousedown",e=>e.stopPropagation());

  enableDragReorder(slot,head,s);
}
/* ===== pointer-based item drag (mouse + touch) ===== */
let pDrag=null; // {it,fromStack,el,ghost,startX,startY,active}
function beginItemDrag(e,it,s,el){
  if(e.button===1||e.button===2)return;
  const startX=e.clientX, startY=e.clientY;
  pDrag={it,fromStack:s,el,ghost:null,active:false,holdTimer:null};
  const HOLD=180, MOVE_CANCEL=10;

  const onMove=ev=>{
    if(!pDrag)return;
    const dx=ev.clientX-startX, dy=ev.clientY-startY;
    if(!pDrag.active){
      // before activation: a small move cancels the hold (lets you scroll/select)
      if(Math.abs(dx)>MOVE_CANCEL||Math.abs(dy)>MOVE_CANCEL){ cancelHold(); }
      return;
    }
    ev.preventDefault();
    moveGhost(ev.clientX,ev.clientY);
    highlightTarget(ev.clientX,ev.clientY);
  };
  const onUp=ev=>{
    cleanup();
    if(pDrag&&pDrag.active){
      const tgt=stackAt(ev.clientX,ev.clientY);
      if(tgt&&tgt.id!==s.id){ suppressClick=true; moveItem(it.id,s.id,tgt.id); }
    }
    pDrag=null;
  };
  const cancelHold=()=>{ if(pDrag&&pDrag.holdTimer){ clearTimeout(pDrag.holdTimer); pDrag.holdTimer=null; } if(pDrag&&!pDrag.active){ cleanup(); pDrag=null; } };
  const cleanup=()=>{
    document.removeEventListener("pointermove",onMove);
    document.removeEventListener("pointerup",onUp);
    document.removeEventListener("pointercancel",onUp);
    if(pDrag){ if(pDrag.holdTimer)clearTimeout(pDrag.holdTimer); if(pDrag.ghost)pDrag.ghost.remove(); if(pDrag.el)pDrag.el.classList.remove("item-lifted"); }
    grid.querySelectorAll(".win-drop").forEach(x=>x.classList.remove("win-drop"));
  };

  pDrag.holdTimer=setTimeout(()=>{
    if(!pDrag)return;
    pDrag.active=true;
    suppressClick=true;
    el.classList.add("item-lifted");
    makeGhost(el,startX,startY);
    if(navigator.vibrate)try{navigator.vibrate(12);}catch(_){}
  },HOLD);

  document.addEventListener("pointermove",onMove,{passive:false});
  document.addEventListener("pointerup",onUp);
  document.addEventListener("pointercancel",onUp);
}
function makeGhost(el,x,y){
  const r=el.getBoundingClientRect();
  const g=el.cloneNode(true);
  g.className="item drag-ghost";
  g.style.width=r.width+"px";
  g.style.left="0"; g.style.top="0";
  g._ox=x-r.left; g._oy=y-r.top;
  document.body.appendChild(g);
  pDrag.ghost=g;
  moveGhost(x,y);
}
function moveGhost(x,y){
  if(!pDrag||!pDrag.ghost)return;
  pDrag.ghost.style.transform="translate("+(x-pDrag.ghost._ox)+"px,"+(y-pDrag.ghost._oy)+"px)";
}
function stackAt(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el)return null;
  const slot=el.closest(".slot");
  if(!slot)return null;
  return state.stacks.find(s=>s.id===slot.dataset.id)||null;
}
function highlightTarget(x,y){
  grid.querySelectorAll(".win-drop").forEach(w=>w.classList.remove("win-drop"));
  const tgt=stackAt(x,y);
  if(tgt&&pDrag&&tgt.id!==pDrag.fromStack.id){
    const slot=grid.querySelector('.slot[data-id="'+tgt.id+'"]');
    if(slot){ const win=slot.querySelector(".win"); if(win)win.classList.add("win-drop"); }
  }
}

function moveItem(itemId,fromId,toId){
  if(fromId===toId)return;
  const from=state.stacks.find(x=>x.id===fromId), to=state.stacks.find(x=>x.id===toId);
  if(!from||!to)return;
  const i=from.items.findIndex(x=>x.id===itemId);
  if(i<0)return;
  const [it]=from.items.splice(i,1);
  to.items.push(it); // keeps text, done, urgent
  markDirty(); render();
}

let dragId=null;
function enableDragReorder(slot,head,s){
  head.addEventListener("mousedown",e=>{ if(e.target.closest("input,button,.swatch"))return; slot.draggable=true; });
  head.addEventListener("touchstart",()=>{ slot.draggable=true; },{passive:true});
  slot.addEventListener("dragstart",e=>{ dragId=s.id; slot.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",s.id);}catch(_){} });
  slot.addEventListener("dragend",()=>{ slot.classList.remove("dragging"); slot.draggable=false; dragId=null; grid.querySelectorAll(".drop-target").forEach(x=>x.classList.remove("drop-target")); });
  slot.addEventListener("dragover",e=>{ if(!dragId||dragId===s.id)return; e.preventDefault(); slot.classList.add("drop-target"); });
  slot.addEventListener("dragleave",()=>slot.classList.remove("drop-target"));
  slot.addEventListener("drop",e=>{ e.preventDefault(); slot.classList.remove("drop-target"); reorder(dragId,s.id); });
}
function reorder(fromId,toId){
  if(!fromId||fromId===toId)return;
  const arr=state.stacks, fi=arr.findIndex(x=>x.id===fromId), ti=arr.findIndex(x=>x.id===toId);
  if(fi<0||ti<0)return;
  const [m]=arr.splice(fi,1); arr.splice(ti,0,m);
  markDirty(); render();
}

/* ============ COLOR MENU ============ */
let cmenu=null;
function colorMenu(anchor,s){
  closeMenu();
  cmenu=document.createElement("div"); cmenu.className="cmenu";
  PALETTE.forEach(c=>{ const b=document.createElement("div"); b.className="c"; b.style.background=c; b.addEventListener("click",()=>{s.color=c;markDirty();closeMenu();render();}); cmenu.appendChild(b); });
  document.body.appendChild(cmenu);
  const r=anchor.getBoundingClientRect();
  cmenu.style.left=Math.min(r.left,window.innerWidth-150)+"px"; cmenu.style.top=(r.bottom+6)+"px";
  setTimeout(()=>document.addEventListener("mousedown",outMenu),0);
}
function outMenu(e){ if(cmenu&&!cmenu.contains(e.target))closeMenu(); }
function closeMenu(){ if(cmenu){cmenu.remove();cmenu=null;document.removeEventListener("mousedown",outMenu);} }

/* ============ NEW STACK ============ */
function newStack(){
  const n=state.stacks.length;
  const s={id:uid(),title:"Untitled stack",color:PALETTE[n%PALETTE.length],collapsed:false,items:[]};
  state.stacks.push(s); markDirty(); render();
  const t=grid.querySelector('.slot[data-id="'+s.id+'"] .win-title');
  if(t){ t.focus(); t.select(); t.scrollIntoView({behavior:"smooth",block:"center"}); }
}

/* ============ ARCHIVE ============ */
function archiveItem(it,s){
  state.archive.unshift({id:it.id,text:it.text||"",stackId:s.id,stackTitle:s.title||"Untitled stack",stackColor:s.color,ts:Date.now()});
  s.items=s.items.filter(x=>x.id!==it.id);
  markDirty(); render(); renderDrawer();
}
function archiveChecked(s){
  const done=s.items.filter(i=>i.done);
  if(!done.length)return;
  done.forEach(it=>state.archive.unshift({id:it.id,text:it.text||"",stackId:s.id,stackTitle:s.title||"Untitled stack",stackColor:s.color,ts:Date.now()}));
  s.items=s.items.filter(i=>!i.done);
  markDirty(); render(); renderDrawer();
}
function restoreItem(aid){
  const i=state.archive.findIndex(a=>a.id===aid);
  if(i<0)return;
  const a=state.archive[i];
  let s=state.stacks.find(x=>x.id===a.stackId);
  if(!s){ // original stack was deleted — recreate it
    s={id:a.stackId,title:a.stackTitle||"Restored",color:a.stackColor||PALETTE[0],collapsed:false,items:[]};
    state.stacks.push(s);
  }
  s.items.push({id:a.id,text:a.text,done:false,urgent:false}); // comes back unchecked
  state.archive.splice(i,1);
  markDirty(); render(); renderDrawer();
}
function deleteArchived(aid){ state.archive=state.archive.filter(a=>a.id!==aid); markDirty(); render(); renderDrawer(); }

/* whole-stack archive */
function archiveStack(s){
  const i=state.stacks.findIndex(x=>x.id===s.id);
  if(i<0)return;
  const [st]=state.stacks.splice(i,1);
  st._archivedTs=Date.now();
  state.archivedStacks.unshift(st);
  markDirty(); render(); renderDrawer();
}
function restoreStack(sid){
  const i=state.archivedStacks.findIndex(x=>x.id===sid);
  if(i<0)return;
  const [st]=state.archivedStacks.splice(i,1);
  delete st._archivedTs;
  state.stacks.push(st); // restored intact, with items and checked states
  markDirty(); render(); renderDrawer();
}
function deleteArchivedStack(sid){
  const st=state.archivedStacks.find(x=>x.id===sid);
  if(st&&confirm('Permanently delete "'+(st.title||"this stack")+'" and everything in it?')){
    state.archivedStacks=state.archivedStacks.filter(x=>x.id!==sid);
    markDirty(); render(); renderDrawer();
  }
}
function clearArchive(){
  const total=state.archive.length+state.archivedStacks.length;
  if(total&&confirm("Permanently delete everything in the archive?")){ state.archive=[]; state.archivedStacks=[]; markDirty(); render(); renderDrawer(); }
}

function renderDrawer(){
  const nItems=state.archive.length, nStacks=state.archivedStacks.length, n=nItems+nStacks;
  $("#archPill").textContent=n; $("#drawCount").textContent=n;
  const body=$("#drawBody");
  if(!n){ body.innerHTML='<div class="draw-empty">Nothing archived yet.<br>Archive whole stacks from the 🗄️ in their header, or archive checked-off items.</div>'; return; }
  body.innerHTML="";

  // archived whole stacks first
  if(nStacks){
    const lbl=document.createElement("div"); lbl.className="arch-section-label"; lbl.textContent="Archived stacks";
    body.appendChild(lbl);
    state.archivedStacks.forEach(st=>{
      const t=st.items?st.items.length:0, d=st.items?st.items.filter(i=>i.done).length:0;
      const row=document.createElement("div"); row.className="arch-stack-row";
      row.innerHTML='<span class="sdot" style="background:'+(st.color||"#888")+'"></span>'
        +'<span class="stxt"><span class="sname"></span><span class="smeta">'+d+'/'+t+' done</span></span>'
        +'<button class="restore">↩ Restore stack</button>'
        +'<button class="del" title="Delete forever">🗑</button>';
      row.querySelector(".sname").textContent=st.title||"Untitled stack";
      row.querySelector(".restore").addEventListener("click",()=>restoreStack(st.id));
      row.querySelector(".del").addEventListener("click",()=>deleteArchivedStack(st.id));
      body.appendChild(row);
    });
  }

  // archived loose items, grouped by their origin stack
  if(nItems){
    const lbl=document.createElement("div"); lbl.className="arch-section-label"; lbl.textContent="Archived items";
    body.appendChild(lbl);
    const groups={};
    state.archive.forEach(a=>{ (groups[a.stackId]=groups[a.stackId]||{title:a.stackTitle,color:a.stackColor,items:[]}).items.push(a); });
    Object.values(groups).forEach(g=>{
      const wrap=document.createElement("div"); wrap.className="arch-group";
      wrap.innerHTML='<div class="arch-group-label"><span class="dot" style="background:'+(g.color||"#888")+'"></span>'+escapeHtml(g.title||"Untitled stack")+'</div>';
      g.items.forEach(a=>{
        const row=document.createElement("div"); row.className="arch-row";
        row.innerHTML='<span class="txt"></span>'
          +'<button class="restore">↩ Restore</button>'
          +'<button class="del" title="Delete forever">🗑</button>';
        row.querySelector(".txt").textContent=a.text||"(empty)";
        row.querySelector(".restore").addEventListener("click",()=>restoreItem(a.id));
        row.querySelector(".del").addEventListener("click",()=>deleteArchived(a.id));
        wrap.appendChild(row);
      });
      body.appendChild(wrap);
    });
  }
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function openDrawer(){ renderDrawer(); $("#drawer-scrim").classList.add("show"); $("#drawer").classList.add("show"); }
function closeDrawer(){ $("#drawer-scrim").classList.remove("show"); $("#drawer").classList.remove("show"); }

/* ============ BOOT ============ */
$("#addBtn").addEventListener("click",newStack);
$("#refresh").addEventListener("click",()=>pullCloud());
$("#openArch").addEventListener("click",openDrawer);
$("#drawClose").addEventListener("click",closeDrawer);
$("#drawer-scrim").addEventListener("click",closeDrawer);
$("#drawClear").addEventListener("click",clearArchive);
$("#acctBtn").addEventListener("click",openAuth);
$("#aCancel").addEventListener("click",()=>$("#authScrim").classList.remove("show"));

loadLocal(); render(); renderDrawer(); initSupa();
